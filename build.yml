name: PyQt5 PDF Merger Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        # PyQt5, PyPDF2, PyInstaller 세 가지가 핵심입니다.
        pip install PyQt5 PyPDF2 pyinstaller

    - name: EXE 파일로 빌드
      # --noconsole: GUI 프로그램이므로 실행 시 검은색 터미널 창이 뜨지 않게 합니다.
      run: pyinstaller --onefile --noconsole main.py

    - name: 결과물 업로드
      uses: actions/upload-artifact@v4
      with:
        name: PDF_Merger_App
        path: dist/main.exe